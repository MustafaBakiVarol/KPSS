<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru-Cevap - Tarih Portalı</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px 0;
            background-color: #2c3e50;
            text-align: center;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 700px;
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .back-nav { margin-bottom: 20px; }
        .back-link { text-decoration: none; color: #e67e22; font-weight: bold; }

        .question-info { color: #7f8c8d; font-size: 14px; margin-bottom: 10px; }
        .question-text {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options { display: flex; flex-direction: column; gap: 12px; }

        .option {
            padding: 15px 20px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            text-align: left;
        }

        .option:hover:not(:disabled) {
            border-color: #bdc3c7;
            background-color: #f9f9f9;
        }

        /* Animasyonlar */
        .correct {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
            animation: pulse 0.5s ease;
        }

        .wrong {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
            animation: shake 0.4s ease;
        }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }

        .feedback {
            margin-top: 25px;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            height: 30px;
        }

        /* Bitti Ekranı */
        #quiz-end { display: none; text-align: center; }
        .restart-btn {
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h2>Tarih Soru Bankası</h2>
    </header>

    <div class="container">
        <div class="back-nav">
            <a href="tarihmain.html" class="back-link">← Geri Dön</a>
        </div>

        <div id="quiz-area">
            <div class="question-info" id="q-counter">Soru 1</div>
            <div class="question-text" id="q-text">Soru yükleniyor...</div>

            <div class="options" id="options-container">
                </div>

            <div id="feedback" class="feedback"></div>
        </div>

        <div id="quiz-end">
            <h2>Tebrikler!</h2>
            <p>Tüm soruları tamamladınız.</p>
            <button class="restart-btn" onclick="location.reload()">Başa Dön</button>
        </div>
    </div>

    <script>
        // --- SORU HAVUZU ---
        // Buraya dilediğin kadar soru ekleyebilirsin.
        const soruHavuzu = [
            {
                soru: "Osmanlı Devleti'nde 'Nizam-ı Cedid' ordusunu kuran padişah hangisidir?",
                siklar: ["I. Abdülhamid", "II. Mahmut", "III. Selim", "IV. Mustafa", "III. Ahmet"],
                cevap: "III. Selim"
            },
            {
                soru: "Aşağıdakilerden hangisi İslamiyet Öncesi Türk Devletleri'nde meclis anlamına gelir?",
                siklar: ["Töre", "Kurultay", "Şad", "Yargu", "Tigite"],
                cevap: "Kurultay"
            },
            {
                soru: "Milli Mücadele'nin haklılığını uluslararası alanda kanıtlayan ilk belge hangisidir?",
                siklar: ["Amasya Tamimi", "Amiral Bristol Raporu", "Havza Genelgesi", "Misak-ı Milli", "Sivas Kongresi"],
                cevap: "Amiral Bristol Raporu"
            }
            // Yeni soruları buraya yukarıdaki formatta eklemeye devam et...
        ];

        let mevcutSorular = [];
        let mevcutSoruIndex = 0;

        // Soruları Karıştırma Fonksiyonu (Fisher-Yates Shuffle)
        function karistir(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function baslatQuiz() {
            mevcutSorular = karistir([...soruHavuzu]); // Havuzu kopyala ve karıştır
            mevcutSoruIndex = 0;
            soruGoster();
        }

        function soruGoster() {
            const soruData = mevcutSorular[mevcutSoruIndex];
            const qText = document.getElementById('q-text');
            const optionsContainer = document.getElementById('options-container');
            const qCounter = document.getElementById('q-counter');
            const feedback = document.getElementById('feedback');

            feedback.innerHTML = "";
            qCounter.innerHTML = `Soru ${mevcutSoruIndex + 1} / ${mevcutSorular.length}`;
            qText.innerHTML = soruData.soru;
            optionsContainer.innerHTML = "";

            // Şıkları da kendi içinde karıştır (opsiyonel)
            const karisikSiklar = karistir([...soruData.siklar]);

            karisikSiklar.forEach(sik => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerHTML = sik;
                btn.onclick = () => cevapKontrol(btn, sik, soruData.cevap);
                optionsContainer.appendChild(btn);
            });
        }

        function cevapKontrol(secilenBtn, secilenSik, dogruCevap) {
            const butalar = document.querySelectorAll('.option');
            butalar.forEach(b => b.style.pointerEvents = 'none'); // Tıklamayı kapat

            if (secilenSik === dogruCevap) {
                secilenBtn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "Doğru! Sonraki soruya geçiliyor...";
                document.getElementById('feedback').style.color = "#27ae60";

                // 1.5 saniye sonra sonraki soruya geç
                setTimeout(() => {
                    mevcutSoruIndex++;
                    if (mevcutSoruIndex < mevcutSorular.length) {
                        soruGoster();
                    } else {
                        document.getElementById('quiz-area').style.display = 'none';
                        document.getElementById('quiz-end').style.display = 'block';
                    }
                }, 1500);
            } else {
                secilenBtn.classList.add('wrong');
                document.getElementById('feedback').innerHTML = "Yanlış! Tekrar deneyin.";
                document.getElementById('feedback').style.color = "#c0392b";
                
                // Yanlışta butonları tekrar aç (tekrar denemesi için)
                setTimeout(() => {
                    secilenBtn.classList.remove('wrong');
                    butalar.forEach(b => b.style.pointerEvents = 'auto');
                    document.getElementById('feedback').innerHTML = "";
                }, 1000);
            }
        }

        // Sayfa yüklenince başlat
        baslatQuiz();
    </script>

</body>
</html>
