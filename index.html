<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Portalı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
        }

        /* Üst Bölüm ve Arama Kutusu */
        header {
            width: 100%;
            padding: 20px 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .search-container {
            width: 80%;
            max-width: 600px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        /* Kartlar Bölümü */
        .container {
            margin-top: 50px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 250px;
            height: 150px;
            background-color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .tarih { border-bottom: 5px solid #e67e22; }
        .cografya { border-bottom: 5px solid #27ae60; }

        h1 { margin-top: 40px; color: #34495e; }
    </style>
</head>
<body>

    <header>
        <div class="search-container">
            <input type="text" placeholder="Konu veya ders ara...">
        </div>
    </header>

    <h1>Hoş Geldiniz, Ne Öğrenmek İstersiniz?</h1>

    <div class="container">
        <a href="tarihmain.html" class="card tarih">
            Tarih
        </a>

        <a href="cografyamain.html" class="card cografya">
            Coğrafya
        </a>
    </div>

</body>
</html>
